[workspace]
members = ["loader", "syslaunch"]
# GTK4/Libadwaita shell helpers (e.g. SystemInfo.exe) live here but build with the
# MSYS2 ucrt64 (gnu) toolchain + the GTK runtime, not this MSVC workspace — so they
# are excluded from `cargo build --workspace` and built by a separate CI job. They
# ship in the same release and `startpe.exe` auto-detects them as siblings.
exclude = ["helpers/sysinfo-gtk", "helpers/run-gtk", "helpers/settings-gtk", "helpers/start-menu-gtk"]

[package]
name = "startpe"
version = "0.1.77"
edition = "2021"
license = "GPL-3.0-or-later"
description = "Free, open-source taskbar and start menu for Windows PE environments"
repository = "https://github.com/steeb-k/startpe"

[dependencies]
winreg = "0.55"
# Referenced by name (`windows_core::…`) in code generated by the windows
# `#[implement]` macro, so it must be a direct dependency.
windows-core = "0.58"

[dependencies.windows]
version = "0.58"
features = [
    "implement",
    "Win32_Foundation",
    "Win32_Globalization",
    "Win32_Graphics_Dwm",
    "Win32_Graphics_Gdi",
    "Win32_Graphics_GdiPlus",
    "Win32_Storage_FileSystem",
    "Win32_Storage_Xps",
    "Win32_Security",
    "Win32_System_Com",
    "Win32_System_DataExchange",
    "Win32_System_Ole",
    "Win32_System_Environment",
    "Win32_System_LibraryLoader",
    "Win32_System_Rpc",
    "Win32_System_SystemInformation",
    "Win32_System_Threading",
    "Win32_System_Variant",
    "Win32_System_Wmi",
    "Win32_UI_Controls",
    "Win32_UI_Controls_Dialogs",
    "Win32_UI_Accessibility",
    "Win32_UI_HiDpi",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Shell",
    "Win32_UI_Shell_Common",
    "Win32_UI_WindowsAndMessaging",
]

[profile.release]
opt-level = "z"
lto = true
strip = true
panic = "abort"
codegen-units = 1
