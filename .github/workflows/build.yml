name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            asset: startpe.exe
          - target: aarch64-pc-windows-msvc
            asset: startpe-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Release assets keep the names the PEBakery script expects
      # (startpe.exe / startpe-arm64.exe).
      - name: Stage asset
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/startpe.exe" "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
