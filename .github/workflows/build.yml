name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      # Build archs sequentially so the two jobs don't race to create the same
      # tag's GitHub release (softprops/action-gh-release "already_exists").
      max-parallel: 1
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            exe_asset: startpe.exe
            dll_asset: startpe_loader.dll
            syslaunch_asset: syslaunch.exe
          # TODO: re-enable ARM64 builds later (temporarily disabled).
          # - target: aarch64-pc-windows-msvc
          #   exe_asset: startpe-arm64.exe
          #   dll_asset: startpe_loader-arm64.dll
          #   syslaunch_asset: syslaunch-arm64.exe
    steps:
      - uses: actions/checkout@v6

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      # Builds both the startpe.exe binary and the startpe_loader cdylib.
      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      # Release assets keep the names the PEBakery script expects (startpe.exe /
      # startpe-arm64.exe, startpe_loader.dll / startpe_loader-arm64.dll,
      # syslaunch.exe / syslaunch-arm64.exe).
      - name: Stage assets
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/startpe.exe" "${{ matrix.exe_asset }}"
          Copy-Item "target/${{ matrix.target }}/release/startpe_loader.dll" "${{ matrix.dll_asset }}"
          Copy-Item "target/${{ matrix.target }}/release/syslaunch.exe" "${{ matrix.syslaunch_asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.exe_asset }}
            ${{ matrix.dll_asset }}
            ${{ matrix.syslaunch_asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.exe_asset }}
            ${{ matrix.dll_asset }}
            ${{ matrix.syslaunch_asset }}
          generate_release_notes: true

  # GTK4/Libadwaita shell helpers (SystemInfo.exe, RunBox.exe). Built with the
  # MSYS2 ucrt64 toolchain + the GTK runtime, separate from the MSVC workspace
  # (they're `exclude`d there). Runs after `build` so the release already exists
  # before we attach to it (no create race; max-parallel 1 so the matrix entries
  # don't race on the release either). Ship in the same release; startpe.exe
  # auto-detects each as a sibling.
  helpers-gtk:
    needs: build
    runs-on: windows-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - dir: helpers/sysinfo-gtk
            asset: SystemInfo.exe
          - dir: helpers/run-gtk
            asset: RunBox.exe
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6

      - name: Set up MSYS2 ucrt64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita

      - name: Build
        run: cargo build --release --manifest-path ${{ matrix.dir }}/Cargo.toml

      - name: Stage asset
        run: cp ${{ matrix.dir }}/target/release/${{ matrix.asset }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
